name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        run: |
          echo "Push to main detected — Render auto-deploys from GitHub."
          echo "Visit https://render.com/dashboard to monitor deployments."
