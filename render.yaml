services:
  - type: web
    name: ai-interview-prep-backend
    env: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: h2
      - key: SERVER_PORT
        value: 8080

  - type: web
    name: ai-interview-prep-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://ai-interview-prep-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
