services:
  - type: web
    name: ai-interview-prep-backend
    env: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: h2
      - key: SERVER_PORT
        value: 8080

  - type: web
    name: ai-interview-prep-frontend
    env: docker
    dockerfilePath: ./docker/Dockerfile.frontend
    dockerContext: .
    plan: free
    dockerBuildArgs:
      - key: VITE_API_URL
        value: https://ai-interview-prep-backend.onrender.com
    envVars:
      - key: BACKEND_URL
        value: https://ai-interview-prep-backend.onrender.com
