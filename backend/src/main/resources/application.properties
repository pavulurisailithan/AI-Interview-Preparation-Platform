# Server
server.port=8080

# =============================================
# MySQL Database Configuration
# Update password below before running
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/interview_prep_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=InterviewPrepPlatformSecretKey2024VeryLongAndSecureKeyForJWTSigning
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/resumes

# Email - disabled for development
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# CORS
app.cors.allowed-origins=http://localhost:3000,https://ai-interview-prep-frontend.onrender.com

# Logging
logging.level.com.interviewprep=INFO
logging.level.org.springframework.security=WARN
